<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" role="img" aria-labelledby="title desc">
  <title id="title">Geometric meanings of dot and cross products</title><desc id="desc">The dot product uses the projection of B along A. The cross product magnitude is the parallelogram area and its direction is perpendicular to the plane.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L8 3 0 6Z" fill="#1a1a1a"/></marker></defs><rect width="760" height="380" fill="#fff"/><path d="M380 40V340" stroke="#ddd" stroke-width="2"/>
  <g stroke="#1a1a1a" stroke-width="4" fill="none" marker-end="url(#a)"><path d="M65 285L325 285"/><path d="M65 285L225 105"/></g><path d="M225 105V285" stroke="#777" stroke-width="2" stroke-dasharray="7 6"/><path d="M135 285A70 70 0 0 0 112 233" fill="none" stroke="#F5C842" stroke-width="5"/>
  <g transform="translate(390)"><path d="M65 285L270 285 340 120 135 120Z" fill="#F5C842" opacity=".28"/><g stroke="#1a1a1a" stroke-width="4" fill="none" marker-end="url(#a)"><path d="M65 285L270 285"/><path d="M65 285L135 120"/></g><path d="M270 285L340 120M135 120L340 120" stroke="#777" stroke-width="2" stroke-dasharray="7 6"/><circle cx="185" cy="205" r="27" fill="#fff" stroke="#1a1a1a" stroke-width="3"/><circle cx="185" cy="205" r="6" fill="#1a1a1a"/></g>
  <g font-family="monospace" fill="#1a1a1a"><text x="105" y="55" font-size="22">dot: projection</text><text x="475" y="55" font-size="22">cross: area + normal</text><text x="120" y="322" font-size="19">B cos θ</text><text x="235" y="175" font-size="19">B</text><text x="190" y="272" font-size="18">θ</text><text x="120" y="350" font-size="18">A·B = A(B cos θ)</text><text x="505" y="335" font-size="18">area = |A×B|</text><text x="590" y="202" font-size="18">out of page</text></g>
</svg>
