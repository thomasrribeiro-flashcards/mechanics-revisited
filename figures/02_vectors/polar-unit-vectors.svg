<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">Polar coordinate unit vectors</title><desc id="desc">At point P, r hat points radially outward and theta hat points tangent in the counterclockwise direction of increasing theta.</desc><rect width="640" height="400" fill="#fff"/>
