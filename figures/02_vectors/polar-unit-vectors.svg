  <path d="M355 135L455 42" stroke="#F5C842" stroke-width="6"/><polygon points="455,42 435,48 449,62" fill="#F5C842"/>
  <path d="M355 135L262 35" stroke="#1a1a1a" stroke-width="5"/><polygon points="262,35 268,55 282,42" fill="#1a1a1a"/>
  <path d="M225 330A80 80 0 0 0 203 276" fill="none" stroke="#F5C842" stroke-width="4"/>
  <g font-family="monospace" fill="#1a1a1a"><text x="365" y="125" font-size="20">P</text><text x="410" y="74" font-size="24" fill="#9B7600">r̂</text><text x="225" y="70" font-size="24">θ̂</text><text x="218" y="292" font-size="20">θ</text><text x="90" y="355" font-size="18">origin</text><text x="330" y="375" font-size="17">θ̂ points toward increasing θ</text></g>
</svg>
